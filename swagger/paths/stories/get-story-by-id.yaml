tags:
  - Stories
summary: Get story by ID
operationId: getStoryById
description: Get full story details by story ID

security: []

parameters:
  - in: path
    name: id
    required: true
    description: Story ID
    schema:
      type: string
      example: 68498236a100312bea079029

responses:
  200:
    description: Story successfully found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found story
            data:
              type: object
              allOf:
                - $ref: ../../components/schemas/story.yaml
                - type: object
                  properties:
                    owner:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: 64f1c9c2e4b0f5a123456789
                        name:
                          type: string
                          example: User Name
                        avatar:
                          oneOf:
                            - type: string
                              format: uri
                            - type: 'null'

  404:
    $ref: ../../components/responses/errors.yaml#/NotFound
