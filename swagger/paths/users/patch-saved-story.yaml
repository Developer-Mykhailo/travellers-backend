tags:
  - Users
summary: Toggle saved story for user
operationId: toggleSavedStoryById
description: Add or remove a story from the user's saved stories list

parameters:
  - in: path
    name: id
    required: true
    description: ID of the story to toggle in saved stories
    schema:
      type: string

responses:
  200:
    description: Story successfully added or deleted from saved list
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Story 68498236a100312bea079029 was successfully added / deleted

            data:
              type: object
              properties:
                saved:
                  type: string
                  example: 'true / false'
                updatedStory:
                  allOf:
                    - $ref: ../../components/schemas/story.yaml
                    - type: object
                      properties:
                        owner:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: 64f1c9c2e4b0f5a123456789
                            name:
                              type: string
                              example: User Name
                            avatar:
                              oneOf:
                                - type: string
                                  format: uri
                                - type: 'null'

  401:
    $ref: ../../components/responses/errors.yaml#/Unauthorized

  404:
    $ref: ../../components/responses/errors.yaml#/NotFound
