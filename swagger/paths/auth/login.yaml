tags:
  - Auth
summary: User login
operationId: loginUser
description: Authenticate user and issue access and refresh tokens

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            type: string
            format: email
            example: test.user@gmail.com
          password:
            type: string
            format: password
            example: password123

responses:
  200:
    description: Successfully logged in
    content:
      application/json:
        schema:
          type: object

          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully logged in a user!
            data:
              type: object

              properties:
                accessToken:
                  type: string
                  example: fzsgimWVxDKyl6+FuaSn8T5dbExCEfUTS8V5QD3v

                accessTokenValidUntil:
                  type: string
                  format: date-time
                  example: 2025-12-31T12:33:26.380Z

  400:
    $ref: ../../components/responses/errors.yaml#/BadRequest

  401:
    description: Invalid email or password
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: UnauthorizedError
            data:
              type: object
              properties:
                message:
                  type: string
                  example: Email or password is incorrect
