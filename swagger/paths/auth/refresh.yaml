tags:
  - Auth
summary: Refresh access token
operationId: refreshToken
description: Refreshes the access token using the refreshToken and sessionId
  stored in HttpOnly cookies.

parameters:
  - in: cookie
    name: refreshToken
    required: true
    schema:
      type: string

  - in: cookie
    name: sessionId
    required: true
    schema:
      type: string

responses:
  200:
    description: Successfully refreshed session
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully refreshed a session!
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: 7WR50Ls658t8LVOPB7geJ0NJ0RtZScr0C3jWK8Pc
                accessTokenValidUntil:
                  type: string
                  example: '2026-06-24T20:50:00.969Z'

  401:
    $ref: ../../components/responses/errors.yaml#/Unauthorized
  404:
    $ref: ../../components/responses/errors.yaml#/NotFound
